<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dixit — Mobile</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="dixit-mobile">

  <!-- 1. Setup -->
  <div class="dx-screen" data-screen="setup">
    <div class="dx-setup-wrap">
      <h1 class="dx-mobile-title">🖼️ Dixit</h1>
      <p class="dx-mobile-sub">상상력과 스토리텔링의 카드 게임</p>
      <input
        id="nickname-input"
        class="dx-nickname-input"
        type="text"
        maxlength="10"
        placeholder="닉네임 (최대 10자)"
        autocomplete="off"
      >
      <button id="btn-join" class="dx-btn-primary">참여하기</button>
    </div>
  </div>

  <!-- 2. Waiting -->
  <div class="dx-screen hidden" data-screen="waiting">
    <div class="dx-waiting-wrap">
      <div id="waiting-nickname" class="dx-waiting-nickname"></div>
      <div id="waiting-hint" class="dx-waiting-hint">게임 시작을 기다리는 중...</div>
      <div id="waiting-players" class="dx-waiting-players"></div>
      <button id="btn-ready" class="dx-btn-primary">준비하기</button>
    </div>
  </div>

  <!-- 3. Storyteller Clue Input -->
  <div class="dx-screen hidden" data-screen="storyteller-clue">
    <div class="dx-phase-header">
      <h2>이야기꾼의 턴</h2>
      <p>카드를 한 장 고르고 힌트를 입력하세요.</p>
    </div>
    <div class="dx-hand-container" id="storyteller-hand"></div>
    <div class="dx-clue-input-area">
      <input type="text" id="clue-input" placeholder="힌트를 입력하세요 (단어, 문장, 소리 등)" autocomplete="off">
      <button id="submit-clue-btn" class="dx-btn-primary" disabled>카드와 힌트를 선택하세요</button>
    </div>
  </div>

  <!-- 4. Card Selection (Followers) -->
  <div class="dx-screen hidden" data-screen="card-select">
    <div class="dx-clue-banner">
      <span class="dx-label">힌트</span>
      <h2 id="current-clue" class="dx-clue-text">"..."</h2>
    </div>
    <p class="dx-instruction">이 힌트와 가장 어울리는 내 카드를 한 장 제출하세요.</p>
    <div class="dx-hand-container" id="follower-hand"></div>
    <button id="submit-card-btn" class="dx-btn-primary" disabled>카드를 선택하세요</button>
  </div>

  <!-- 5. Voting -->
  <div class="dx-screen hidden" data-screen="vote">
    <div class="dx-clue-banner">
      <span class="dx-label">힌트</span>
      <h2 id="voting-clue" class="dx-clue-text">"..."</h2>
    </div>
    <p class="dx-instruction">이야기꾼의 카드는 무엇일까요? 한 장을 선택하세요.</p>
    <div class="dx-board-container" id="voting-board"></div>
    <button id="submit-vote-btn" class="dx-btn-primary" disabled>투표하기</button>
  </div>

  <!-- 6. Round Result -->
  <div class="dx-screen hidden" data-screen="round-result">
    <div class="dx-result-wrap">
      <h1 id="result-title" class="dx-result-title">라운드 종료</h1>
      <p id="result-msg" class="dx-result-msg">PC 화면에서 확인하세요!</p>
      <div class="dx-my-score-box">
        <span class="dx-score-label">내 점수</span>
        <div id="my-score" class="dx-my-score">0</div>
      </div>
      <p id="waiting-next" class="dx-waiting-next">다음 라운드를 기다리고 있습니다...</p>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
