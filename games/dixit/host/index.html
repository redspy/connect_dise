<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dixit — Host</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="host-body">

  <!-- 1. Lobby -->
  <div class="game-overlay view" data-phase="lobby">
    <div class="lobby-header">
      <h1 class="logo-text">Dixit 🖼️</h1>
      <p class="description">상상력과 스토리텔링의 예술적인 카드 게임</p>
    </div>

    <div class="lobby-content">
      <div class="qr-panel glass">
        <h2>참가하기</h2>
        <div id="qr-box" class="qr-container"></div>
        <p class="qr-url" id="join-url"></p>
      </div>

      <div class="players-panel glass">
        <div class="players-header">
          <h2>플레이어 (<span id="player-count">0</span>/8)</h2>
        </div>
        <div id="player-grid" class="player-grid"></div>
        <div class="preparation-status">
          <p id="ready-status">최소 3명의 플레이어가 필요합니다.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. Storytelling Phase (Clue wait) -->
  <div class="game-overlay view hidden" data-phase="storytelling">
    <div class="phase-header">
      <h2 id="storyteller-name" class="storyteller-badge">이야기꾼 선정 중...</h2>
      <p class="instruction">이야기꾼이 카드를 고르고 힌트를 입력하고 있습니다.</p>
    </div>
    <div class="center-content">
      <div class="loading-animation">
        <div class="card-loader"></div>
      </div>
    </div>
  </div>

  <!-- 3. Card Selection Phase (Others wait) -->
  <div class="game-overlay view hidden" data-phase="card-selection">
    <div class="phase-header">
      <div class="clue-banner glass">
        <span class="label">힌트</span>
        <h2 id="current-clue" class="clue-text">"..."</h2>
      </div>
      <p class="instruction">다른 플레이어들이 힌트에 어울리는 카드를 제출하고 있습니다.</p>
    </div>
    <div class="submission-status">
      <div id="submission-grid" class="submission-grid"></div>
    </div>
  </div>

  <!-- 4. Voting Phase -->
  <div class="game-overlay view hidden" data-phase="voting">
    <div class="phase-header">
      <div class="clue-banner glass">
        <span class="label">힌트</span>
        <h2 id="voting-clue" class="clue-text">"..."</h2>
      </div>
      <p class="instruction">이야기꾼의 카드는 무엇일까요? 투표해주세요!</p>
    </div>
    <div class="board-container">
      <div id="card-board" class="card-board"></div>
    </div>
    <div class="vote-status-bar">
      <div id="vote-progress" class="vote-progress"></div>
    </div>
  </div>

  <!-- 5. Round Results -->
  <div class="game-overlay view hidden" data-phase="round-result">
    <div class="result-header">
      <h1>라운드 결과</h1>
      <p id="round-conclusion"></p>
    </div>
    <div class="result-board">
      <div id="result-cards" class="result-cards"></div>
    </div>
    <div class="score-update-list" id="score-updates"></div>
    <div class="action-footer">
      <button id="next-round-btn" class="primary-btn">다음 라운드</button>
    </div>
  </div>

  <!-- 6. Game Final Results -->
  <div class="game-overlay view hidden" data-phase="final">
    <div class="final-content glass">
      <h1>최종 순위 🎉</h1>
      <div id="ranking-list" class="ranking-list"></div>
      <button id="restart-btn" class="primary-btn">로비로 이동</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
