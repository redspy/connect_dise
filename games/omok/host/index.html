<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오목 (Omok) — Host</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="host-board">
  <!-- 항상 보이는 앱바 -->
  <div id="game-board" class="omok-host-container">
    <game-appbar title="⚫ 오목 (Omok)"></game-appbar>

    <div class="omok-main-wrap omok-overlay hidden" data-phase="playing">
      <div class="status-bar">
        <div class="player-indicator current" id="player-black">
          <div class="stone black"></div>
          <span id="name-black">흑돌 (대기)</span>
        </div>
        <div class="vs">VS</div>
        <div class="player-indicator" id="player-white">
          <div class="stone white"></div>
          <span id="name-white">백돌 (대기)</span>
        </div>
      </div>

      <div class="board-wrapper">
        <div id="board" class="board">
          <!-- Grid cells will be generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- 1. 로비 -->
  <div class="omok-overlay" data-phase="lobby">
    <game-lobby title="⚫ 오목 (Omok)" min-players="2">
      <div class="lobby-desc-title">게임 방법</div>
      <ul class="lobby-desc-list">
        <li>모바일 화면으로 돌을 놓을 위치를 선택하세요.</li>
        <li>13×13 바둑판에서 가로, 세로, 대각선 중 <b>5개</b>를 먼저 연결하면 승리합니다.</li>
        <li>흑돌이 먼저 시작하며, 교대로 착수합니다.</li>
      </ul>
      <button id="demoPlayBtn" class="primary-btn demo-btn" style="margin-top: 1.2rem; background: linear-gradient(135deg, var(--lobby-accent, #f59e0b), #d97706); color: #000000; border: none; font-weight: bold; padding: 0.8rem 1.6rem; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">🤖 데모 플레이 실행</button>
    </game-lobby>
  </div>

  <!-- 2. 결과 오버레이 -->
  <div class="omok-overlay hidden" data-phase="result">
    <div class="omok-result-panel">
      <h2 id="modal-message" class="omok-result-title">흑돌 승리!</h2>
      <button id="btn-restart-result" class="omok-btn-start">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
