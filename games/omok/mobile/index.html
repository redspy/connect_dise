<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>오목 — Controller</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="mobile-controller">
  <div class="app-container">
    <header class="app-header">
      <div class="logo">OMOK</div>
      <div id="connection-status" class="status-indicator"></div>
      <div id="role-display" class="role-badge hidden">대기 중</div>
    </header>

    <!-- 1. 대기 화면 -->
    <div class="omok-screen" data-screen="waiting">
      <div class="screen-content">
        <h2>대기실</h2>
        <p class="status-msg">다른 플레이어가 접속하고 준비 완료할 때까지 대기해주세요.</p>
        <button id="btn-ready" style="margin-top: 20px; padding: 14px 24px; background: linear-gradient(135deg, #00eeff 0%, #0099ff 100%); border: none; border-radius: 12px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; max-width: 200px;">준비하기</button>
        <div id="ready-status-text" class="ready-info">상대방을 기다리는 중...</div>
      </div>
    </div>

    <!-- 2. 내 턴 (착수 가능) -->
    <div class="omok-screen hidden" data-screen="my-turn">
      <div class="screen-content">
        <h2 class="turn-title">내 차례입니다!</h2>
        <p class="hint">바둑판을 터치하여 돌을 놓을 위치를 선택한 뒤 착수 버튼을 누르세요.</p>
        
        <div class="mobile-board-wrapper">
          <div id="mobile-board" class="mobile-board">
            <!-- 13x13 grid will be generated by JS -->
          </div>
        </div>

        <div class="action-panel">
          <div id="selection-info" class="selection-info">선택된 좌표: 없음</div>
          <button id="btn-play-stone" class="action-btn play-btn" disabled>착수하기</button>
        </div>
      </div>
    </div>

    <!-- 3. 상대 턴 (대기) -->
    <div class="omok-screen hidden" data-screen="opponent-turn">
      <div class="screen-content">
        <h2 class="turn-title waiting">상대방의 턴</h2>
        <p class="hint">상대방이 고심하는 중입니다. 잠시 기다려주세요...</p>
        
        <div class="mobile-board-wrapper disabled">
          <div id="mobile-board-disabled" class="mobile-board">
            <!-- Disabled board view for passive watching -->
          </div>
        </div>
        
        <div class="action-panel">
          <div class="waiting-spinner"></div>
          <div class="waiting-text">상대방 착수 대기 중...</div>
        </div>
      </div>
    </div>

    <!-- 4. 게임 종료 결과 -->
    <div class="omok-screen hidden" data-screen="result">
      <div class="screen-content result-screen">
        <div id="result-icon" class="result-icon">🏆</div>
        <h2 id="result-text" class="result-title">게임 종료</h2>
        <p id="result-desc" class="result-desc"></p>
        <div class="ready-info">호스트에서 다시 시작을 누르면 대기실로 이동합니다.</div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
