<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오목 (AI 대전)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="game-container">
    <header>
      <h1>OMOK</h1>
      <div class="status-bar">
        <div class="player-indicator current" id="player-black">
          <div class="stone black"></div>
          <span>Player</span>
        </div>
        <div class="vs">VS</div>
        <div class="player-indicator" id="player-white">
          <div class="stone white"></div>
          <span>AI</span>
        </div>
      </div>
    </header>

    <main>
      <div class="board-wrapper">
        <div id="board" class="board">
          <!-- Grid cells will be generated by JS -->
        </div>
      </div>
    </main>

    <footer>
      <button id="restart-btn" class="btn-restart">New Game</button>
      <button id="demoPlayBtn" class="btn-demo" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-weight: bold; border: none; border-radius: 4px; padding: 10px 16px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">🤖 데모 플레이</button>
      <a href="/" class="btn-lobby">← 로비</a>
    </footer>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-message">Game Over</h2>
      <button id="modal-restart-btn" class="btn-primary">Play Again</button>
    </div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
