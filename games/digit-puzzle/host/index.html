<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Puzzle</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="dp-host">

  <!-- ── 항상 보이는 대시보드 ──────────────────────────────────── -->
  <div id="game-board" class="dp-game-board">
    <header class="dp-board-header">
      <div class="dp-header-left">
        <button id="btn-back" class="dp-btn-header">&larr; 로비</button>
        <div class="dp-board-title">Digit Puzzle</div>
      </div>
      <div class="dp-header-right">
        <span id="dashboard-timer" class="dp-timer">00:00</span>
        <button id="btn-restart-game" class="dp-btn-header">다시하기</button>
      </div>
    </header>

    <div id="dashboard-grid" class="dp-dashboard-grid"></div>

    <div id="winner-display" class="dp-winner-display hidden"></div>
  </div>

  <!-- ── 로비 오버레이 ──────────────────────────────────────────── -->
  <div class="dp-overlay" data-phase="lobby">
    <div class="dp-lobby-panel">
      <div class="dp-lobby-top">
        <button class="dp-btn-header" onclick="location.href='/'"> &larr; 게임 선택</button>
      </div>

      <h1 class="dp-lobby-title">Digit Puzzle</h1>
      <p class="dp-lobby-desc">4&times;4 슬라이딩 퍼즐 레이스! 먼저 완성하면 승리</p>

      <div class="dp-lobby-qr-row">
        <div id="qr-top-left" class="dp-qr-corner"></div>
        <div id="qr-top-right" class="dp-qr-corner"></div>
      </div>

      <div class="dp-session-info">
        방 코드 <strong id="session-code">------</strong>
      </div>

      <div class="dp-lobby-players-wrap">
        <div class="dp-lobby-players-title">참가자</div>
        <div id="lobby-players" class="dp-lobby-players-grid"></div>
      </div>

      <div id="ready-status" class="dp-ready-status">플레이어를 기다리는 중...</div>
      <button id="btn-start" class="dp-btn-start" disabled>최소 2명 필요</button>

      <div class="dp-lobby-qr-row dp-lobby-qr-bottom">
        <div id="qr-bottom-left" class="dp-qr-corner"></div>
        <div id="qr-bottom-right" class="dp-qr-corner"></div>
      </div>
    </div>
  </div>

  <!-- ── 결과 오버레이 ──────────────────────────────────────────── -->
  <div class="dp-overlay hidden" data-phase="result">
    <div class="dp-result-panel">
      <h2 class="dp-result-title">&#x1F3C6; 게임 종료!</h2>
      <div id="result-rankings" class="dp-result-rankings"></div>
      <button id="btn-restart-result" class="dp-btn-start">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
