<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Puzzle</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="dp-host host-board">

  <!-- ── 항상 보이는 대시보드 ──────────────────────────────────── -->
  <div id="game-board" class="dp-game-board">
    <game-appbar title="Digit Puzzle"></game-appbar>

    <div id="dashboard-grid" class="dp-dashboard-grid"></div>

    <div id="winner-display" class="dp-winner-display hidden"></div>
  </div>

  <!-- ── 로비 오버레이 ──────────────────────────────────────────── -->
  <div class="dp-overlay" data-phase="lobby">
    <game-lobby title="Digit Puzzle" min-players="2">
      <div class="lobby-desc-title">게임 방법</div>
      <ul class="lobby-desc-list">
        <li><b>4×4 슬라이딩 퍼즐</b> 레이스!</li>
        <li>숫자를 올바른 순서로 <b>먼저 완성</b>하면 승리</li>
        <li>모두 준비하면 <b>동시에 시작</b>됩니다</li>
      </ul>
      <button id="demoPlayBtn" class="primary-btn demo-btn" style="margin-top: 1.2rem; background: linear-gradient(135deg, var(--lobby-accent, #f59e0b), #d97706); color: #000000; border: none; font-weight: bold; padding: 0.8rem 1.6rem; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">🤖 데모 플레이 실행</button>
    </game-lobby>
  </div>

  <!-- ── 결과 오버레이 ──────────────────────────────────────────── -->
  <div class="dp-overlay hidden" data-phase="result">
    <div class="dp-result-panel">
      <h2 class="dp-result-title">&#x1F3C6; 게임 종료!</h2>
      <div id="result-rankings" class="dp-result-rankings"></div>
      <button id="btn-restart-result" class="dp-btn-start">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
