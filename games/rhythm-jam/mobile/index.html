<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>리듬 잼 - Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="mobile-controller">
  <!-- 메인 모바일 감싸기 -->
  <div class="pp-mobile-container">

    <!-- ─── 1. 접속 대기 및 설정 페이즈 ─── -->
    <div class="mobile-screen" data-screen="setup">
      <div class="setup-card card-bg">
        <h2 class="setup-title">🥁 RHYTHM JAM</h2>
        <p class="setup-desc">방 이름을 정하고 대기실에 입장하여 악기를 부여받으세요.</p>
        
        <div class="form-group">
          <input type="text" id="nickname-input" class="mobile-input" placeholder="닉네임 입력 (최대 6자)" maxlength="6">
        </div>
        
        <button id="btn-join" class="btn-action">대기실 입장</button>
      </div>
    </div>

    <!-- ─── 2. 준비 상태 페이즈 ─── -->
    <div class="mobile-screen hidden" data-screen="waiting">
      <div class="waiting-card card-bg">
        <div class="spinner">🥁</div>
        <h2 class="waiting-title">대기실 대기 중</h2>
        <p class="waiting-desc">방장이 수록곡 설정을 정하고 시작할 때까지 잠시 대기하세요.</p>
        
        <button id="btn-ready" class="btn-action ready-btn">준비 완료</button>
      </div>
    </div>

    <!-- ─── 3. 리듬 게임 플레이 페이즈 ─── -->
    <div class="mobile-screen hidden" data-screen="game">
      <div class="game-hud">
        <div class="hud-role-box">
          <span class="role-lbl">MY INSTRUMENT</span>
          <span id="role-name" class="role-val">BASS DRUM</span>
        </div>
        <div class="hud-stats">
          <div class="hud-stat-item">
            <span class="hud-stat-lbl">SCORE</span>
            <span id="game-score" class="hud-stat-val">0</span>
          </div>
          <div class="hud-stat-item align-right">
            <span class="hud-stat-lbl">COMBO</span>
            <span id="game-combo" class="hud-stat-val">0</span>
          </div>
        </div>
      </div>

      <!-- 🥁 거대 네온 드럼 타격 패드 (화면 전역 배치) ─── -->
      <div class="pad-wrapper">
        <button id="drum-pad-btn" class="drum-pad-btn">
          <span class="pad-pulse-ring"></span>
          <div class="pad-inner">
            <span class="pad-icon">🥁</span>
            <span class="pad-action-lbl">HIT THE BEAT!</span>
          </div>
        </button>
      </div>

      <!-- 미스 긴급 피드백 플래시 -->
      <div id="miss-flash-alert" class="miss-flash hidden"></div>
    </div>

    <!-- ─── 4. 결과 발표 페이즈 ─── -->
    <div class="mobile-screen hidden" data-screen="result">
      <div class="result-card card-bg">
        <span class="result-medal">🏆</span>
        <h2 class="result-title">합주 완성!</h2>
        <div class="result-stats">
          <p>최종 점수: <strong id="result-score" class="neon-text-cyan">0</strong></p>
          <p>최대 콤보: <strong id="result-max-combo" class="neon-text-yellow">0</strong></p>
          <p>합주 등급: <strong id="result-grade" class="neon-text-pink">S</strong></p>
        </div>
        <p class="result-footer">호스트 화면에서 다음 단계를 결정해 주세요.</p>
      </div>
    </div>

  </div>

  <!-- SDK 및 클라이언트 스크립트 -->
  <script type="module" src="./main.js"></script>
</body>
</html>
