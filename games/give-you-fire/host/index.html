<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Give You Fire — Host</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="host-board">

  <!-- ══════════════════════════════════════════
       로비 오버레이 (data-phase="lobby")
  ══════════════════════════════════════════ -->
  <div class="gyf-overlay" data-phase="lobby">
    <game-lobby title="Give You Fire 🔥" min-players="1">
      <div class="gyf-lobby-desc-title">게임 방법</div>
      <ul class="gyf-lobby-desc-list">
        <li>블록이 쌓이지 않도록 라인을 클리어하세요</li>
        <li>라인 클리어 시 상대방의 <b>속도가 올라갑니다!</b></li>
        <li>레벨 100 달성 또는 상대 전원 탈락 시 <b>승리!</b></li>
      </ul>
      <label class="gyf-option-row">
        <input type="checkbox" id="chk-next-piece">
        <span>다음 블록 미리보기 ON</span>
      </label>
      <button id="demoPlayBtn" class="primary-btn demo-btn" style="margin-top: 1.2rem; background: linear-gradient(135deg, var(--lobby-accent, #f59e0b), #d97706); color: #000000; border: none; font-weight: bold; padding: 0.8rem 1.6rem; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">🤖 데모 플레이 실행</button>
    </game-lobby>
  </div>

  <!-- ══════════════════════════════════════════
       게임 중 대시보드 (data-phase="playing")
  ══════════════════════════════════════════ -->
  <div class="gyf-overlay hidden" data-phase="playing">
    <div class="gyf-playing-header">
      <span class="gyf-game-title">🔥 Give You Fire</span>
      <span class="gyf-elapsed" id="game-elapsed">00:00</span>
      <button class="gyf-btn gyf-btn-danger-sm" id="btn-restart-game">리셋</button>
    </div>

    <!-- 플레이어 카드 그리드 (최대 4개, 2×2) -->
    <div class="gyf-dashboard-grid" id="dashboard-grid"></div>
  </div>

  <!-- ══════════════════════════════════════════
       결과 오버레이 (data-phase="result")
  ══════════════════════════════════════════ -->
  <div class="gyf-overlay hidden" data-phase="result">
    <div class="gyf-result-panel">
      <div class="gyf-result-title">🏆 최종 결과</div>
      <div class="gyf-rankings" id="result-rankings"></div>
      <button class="gyf-btn gyf-btn-primary" id="btn-restart-result">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
