<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Give You Fire</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="mobile-controller">

  <!-- ══════════════════════════════════════════
       설정 화면 (data-screen="setup")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen" data-screen="setup">
    <div class="gyf-setup-panel">
      <div class="gyf-mobile-logo">
        <span class="gyf-logo-fire">Give You</span>
        <span class="gyf-logo-accent"> Fire</span> 🔥
      </div>
      <p class="gyf-setup-hint">닉네임을 입력하고 참여하세요</p>
      <input
        class="gyf-input"
        id="nickname-input"
        type="text"
        maxlength="8"
        placeholder="닉네임 (최대 8자)"
        autocomplete="off"
      >
      <button class="gyf-btn gyf-btn-primary" id="btn-join">참여하기</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       대기 화면 (data-screen="waiting")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen hidden" data-screen="waiting">
    <div class="gyf-waiting-panel">
      <div class="gyf-mobile-logo">🔥</div>
      <div class="gyf-waiting-nick" id="waiting-nickname">-</div>
      <p class="gyf-waiting-hint">호스트가 게임을 시작할 때까지 대기하세요</p>
      <div class="gyf-waiting-players" id="waiting-players"></div>
      <button class="gyf-btn gyf-btn-primary" id="btn-ready">준비하기</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       게임 화면 (data-screen="game")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen hidden" data-screen="game">

    <!-- 속도 레벨 바 -->
    <div class="gyf-level-bar-wrap">
      <div class="gyf-level-bar-fill" id="level-bar-fill"></div>
      <span class="gyf-level-label" id="game-level">Lv.1</span>
    </div>

    <!-- 보드 + 미리보기: 전체 제스처 영역 -->
    <div class="gyf-board-area" id="gesture-area">

      <!-- 보드 캔버스 (터치 이벤트는 gesture-area에서 처리) -->
      <canvas class="gyf-board-canvas" id="game-board-canvas" width="300" height="600"></canvas>

      <!-- 다음 블록 미리보기 (showNextPiece ON 시만 표시) -->
      <div class="gyf-next-panel" id="next-panel" style="display:none;">
        <div class="gyf-next-label">NEXT</div>
        <canvas class="gyf-next-canvas" id="next-piece-canvas" width="80" height="80"></canvas>
      </div>

      <!-- 제스처 힌트 오버레이 (게임 시작 후 3초간 표시) -->
      <div class="gyf-gesture-hint" id="gesture-hint">
        <div class="gyf-hint-row"><span class="gyf-hint-icon">👆</span> 탭 → 회전</div>
        <div class="gyf-hint-row"><span class="gyf-hint-icon">↔</span> 드래그 → 이동</div>
        <div class="gyf-hint-row"><span class="gyf-hint-icon">👇</span> 드래그 유지 → 빠른 낙하</div>
        <div class="gyf-hint-row"><span class="gyf-hint-icon">⚡</span> 빠른 스와이프 → 즉시 드롭</div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════
       탈락 화면 (data-screen="eliminated")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen hidden" data-screen="eliminated">
    <div class="gyf-elim-panel">
      <div class="gyf-elim-title">💀 GAME OVER</div>
      <p class="gyf-elim-hint">호스트 화면에서 남은 경기를 관전하세요</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       솔로 클리어 화면 (data-screen="solo-clear")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen hidden" data-screen="solo-clear">
    <div class="gyf-clear-panel">
      <div class="gyf-clear-title">🔥 CLEAR!</div>
      <p class="gyf-clear-hint">레벨 100 달성! 훌륭합니다!</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       결과 화면 (data-screen="result")
  ══════════════════════════════════════════ -->
  <div class="gyf-screen hidden" data-screen="result">
    <div class="gyf-result-panel">
      <div class="gyf-result-my-rank" id="result-my-rank">-위</div>
      <div class="gyf-result-list" id="result-ranking-list"></div>
      <button class="gyf-btn gyf-btn-primary" id="btn-rematch">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
