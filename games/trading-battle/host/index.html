<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>천하제일단타대회</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="tb-host">
    <!-- 항상 보이는 게임 보드 (trading 페이즈에서만 실제 내용 표시) -->
    <div id="game-board" class="game-board hidden">
      <!-- 상단 헤더 -->
      <div class="tb-header">
        <div class="tb-header-left">
          <div class="game-title-badge">천하제일단타대회</div>
          <div id="stock-name" class="stock-name">삼스전자</div>
          <div class="price-info">
            <span id="current-price" class="current-price">₩0</span>
            <span id="price-change" class="price-change">+0.0%</span>
          </div>
        </div>
        <div class="tb-header-center">
          <div id="top-player" class="top-player-badge">--</div>
        </div>
        <div class="tb-header-right">
          <div class="timer-wrap">
            <span class="timer-label">남은 시간</span>
            <span id="timer-display" class="timer-value">05:00</span>
          </div>
          <button id="btn-quit-game" class="btn-quit-game">그만하기</button>
        </div>
      </div>

      <!-- 시간 progress bar -->
      <div class="timer-progress-bar">
        <div id="timer-progress-fill" class="timer-progress-fill"></div>
      </div>

      <!-- 차트 영역 -->
      <div id="chart-container" class="chart-container"></div>

      <!-- 카운트다운 오버레이 -->
      <div id="countdown-display" class="countdown-display hidden"></div>

      <!-- 하단 플레이어 패널 -->
      <div id="player-panels" class="player-panels"></div>
    </div>

    <!-- ── 개발 모드 오버레이 (왼쪽 패널) ──────────────────────────────── -->
    <div class="tb-overlay hidden" id="dev-mode-overlay" data-phase="dev_mode">
      <div class="dev-panel">
        <div class="dev-panel-title">⚙️ 개발 모드</div>
        <div class="dev-panel-content">
          <div class="dev-setting-group">
            <label class="radio-label">
              <input type="radio" name="dev-player-count" value="3" checked />
              가상 플레이어 3명
            </label>
            <label class="radio-label">
              <input type="radio" name="dev-player-count" value="4" />
              가상 플레이어 4명
            </label>
          </div>
          <button id="btn-dev-start" class="btn-dev-start">로비 입장</button>
        </div>
      </div>
    </div>

    <!-- ── 로비 오버레이 ──────────────────────────────────────────── -->
    <div class="tb-overlay" data-phase="lobby">
      <game-lobby title="천하제일단타대회" min-players="2">
        <div class="lobby-desc-title">게임 방법</div>
        <ul class="lobby-desc-list">
          <li>실제 주식 차트를 함께 보며 <b>매수/매도 타이밍</b>을 경쟁</li>
          <li>초기 자산 <b>₩100,000,000</b>으로 시작</li>
          <li>롱(상승)/숏(하락) 포지션으로 수익 극대화</li>
          <li>레버리지 <b>2배</b> — 고위험 고수익</li>
          <li>제한 시간 종료 시 <b>최종 자산</b> 기준 순위 결정</li>
        </ul>
        <div class="lobby-desc-tip">💡 주문은 현재 캔들 종가에 체결됩니다!</div>
      </game-lobby>
    </div>

    <!-- ── 게임 결과 오버레이 ──────────────────────────────────────── -->
    <div class="tb-overlay hidden" data-phase="game_result">
      <div class="result-panel">
        <h2 class="result-title">🏆 천하제일단타대회 💵</h2>
        <div id="result-rankings" class="result-rankings"></div>
        <button id="btn-restart" class="btn-restart">다시하기</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
