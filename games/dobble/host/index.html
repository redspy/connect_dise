<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dobble</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="host-board">

  <!-- ── 게임 보드 (playing 페이즈에서 보임) ─────────────────────── -->
  <div id="game-board">
    <header class="db-header">
      <div class="db-header-left">
        <button id="btn-back-lobby" class="db-btn-header">← 로비</button>
        <div class="db-title">Dobble</div>
      </div>
      <div class="db-header-right">
        <button id="btn-restart" class="db-btn-header">다시하기</button>
      </div>
    </header>

    <!-- 점수 현황판 (항상 표시) -->
    <div id="score-cards" class="db-score-cards"></div>

    <!-- 중앙 카드 -->
    <div class="db-center-area">
      <div class="db-center-label">중앙 카드</div>
      <div id="center-card" class="db-center-card"></div>

      <!-- 정답 리액션 플래시 -->
      <div id="round-flash" class="db-round-flash hidden">
        <span class="db-flash-check">✓</span>
        <span class="db-flash-dot"></span>
        <div class="db-flash-body">
          <span class="db-flash-name"></span>
          <span class="db-flash-points"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 로비 오버레이 ───────────────────────────────────────────── -->
  <div class="db-overlay" data-phase="lobby">
    <div class="db-lobby-panel">

      <div class="db-lobby-top">
        <button onclick="location.href='/'" class="db-btn-header">← 게임 선택</button>
      </div>

      <div class="db-lobby-title">🎯 Dobble</div>
      <div class="db-lobby-sub">일치하는 심볼을 먼저 찾아라!</div>

      <div class="db-lobby-body">

        <!-- QR -->
        <div class="db-lobby-qr-col">
          <div id="qr-container"></div>
          <div id="qr-url-text" class="db-qr-url"></div>
        </div>

        <!-- 설정 + 게임 설명 -->
        <div class="db-lobby-settings-col">
          <div class="db-setting-group">
            <label class="db-setting-label">심볼 모드</label>
            <select id="sel-mode" class="db-select">
              <option value="image">그림 (Image)</option>
              <option value="hanja">한자 (Hanja)</option>
              <option value="hiragana">히라가나</option>
              <option value="katakana">가타카나</option>
            </select>
          </div>
          <div class="db-setting-group">
            <label class="db-setting-label">목표 점수</label>
            <select id="sel-winscore" class="db-select">
              <option value="5">5점</option>
              <option value="10" selected>10점</option>
              <option value="15">15점</option>
            </select>
          </div>

          <div class="db-rules">
            <div class="db-rules-title">게임 방법</div>
            <ul class="db-rules-list">
              <li>중앙 카드와 내 카드에서 <b>같은 심볼</b>을 찾아 탭!</li>
              <li>정답 시 내 카드가 새 중앙 카드로, 새 카드 수령</li>
              <li>오답 시 <b>3초 패널티</b></li>
              <li>목표 점수를 먼저 달성한 플레이어 승리</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 참가자 목록 -->
      <div class="db-lobby-players-title">참가자</div>
      <div id="lobby-players" class="db-lobby-players"></div>

      <div id="ready-status" class="db-ready-status">플레이어를 기다리는 중...</div>
      <button id="btn-start" class="db-btn-start" disabled>최소 2명 필요</button>
    </div>
  </div>

  <!-- ── 결과 오버레이 ───────────────────────────────────────────── -->
  <div class="db-overlay hidden" data-phase="result">
    <div class="db-result-panel">
      <h2 class="db-result-title">🏆 게임 종료!</h2>
      <div id="result-rankings" class="db-result-rankings"></div>
      <button id="btn-restart" class="db-btn-start" onclick="location.reload()">다시하기</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
