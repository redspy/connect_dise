<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spin Battle - Board</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="spin-board">
    <!-- Three.js canvas container -->
    <div id="spin-canvas"></div>

    <!-- HUD Overlay -->
    <div id="spin-hud">
      <div id="rpm-bars"></div>
    </div>

    <!-- Lobby Overlay -->
    <div id="lobby-overlay" class="spin-overlay" data-phase="lobby">
      <game-lobby title="Top Battle" min-players="2">
        <div class="spin-lobby-desc-title">게임 방법</div>
        <ul class="spin-lobby-desc-list">
          <li>QR로 접속 후 <b>준비</b> 버튼을 누르세요</li>
          <li>핸드폰을 <b>좌우로 흔들어</b> 팽이를 충전하세요</li>
          <li>배틀에서 <b>아이템</b>을 획득해 상대를 날려버리세요!</li>
          <li>마지막까지 살아남은 팽이가 <b>승리!</b></li>
        </ul>
        <button id="demoPlayBtn" class="primary-btn demo-btn" style="margin-top: 1.2rem; background: linear-gradient(135deg, var(--lobby-accent, #f59e0b), #d97706); color: #000000; border: none; font-weight: bold; padding: 0.8rem 1.6rem; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">🤖 데모 플레이 실행</button>
      </game-lobby>
    </div>

    <!-- Launching Overlay -->
    <div id="launch-overlay" class="spin-overlay hidden" data-phase="launching">
      <div class="spin-panel">
        <h2>런칭!</h2>
        <p>핸드폰을 좌우로 흔들어 회전력을 모으세요!</p>
        <div id="launch-countdown" class="spin-countdown">3</div>
      </div>
    </div>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="spin-overlay hidden" data-phase="countdown">
      <div class="spin-countdown-big" id="battle-countdown">3</div>
    </div>

    <!-- Result Overlay -->
    <div id="result-overlay" class="spin-overlay hidden" data-phase="result">
      <div class="spin-panel">
        <h2>결과</h2>
        <div id="rankings-display"></div>
        <button id="btn-restart">다시 하기</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
