<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>게임 로비</title>
  <link rel="stylesheet" href="/src/style.css">
  <style>
    /* ── 로비 레이아웃 ──────────────────────────────────────────────── */
    body.host-board {
      overflow-x: hidden;
      overflow-y: auto;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important; /* Ensure top is always reachable */
      min-height: 100vh !important;
      padding: clamp(40px, 8vh, 100px) 20px 80px !important; 
      box-sizing: border-box;
    }

    /* 카지노 테이블 oval을 viewport에 고정 — 스크롤해도 배경 유지 */
    body.host-board::before,
    body.host-board::after {
      position: fixed;
      pointer-events: none;
    }

    /* ── 타이틀 ─────────────────────────────────────────────────────── */
    .lobby-title {
      position: relative;
      z-index: 10;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      margin: 0 0 clamp(20px, 4vh, 40px);
      background: linear-gradient(180deg, #ffe566 0%, #b8960c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: clamp(2px, 1vw, 6px);
      text-align: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* ── 탭 바 ──────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 12px;
      margin-bottom: clamp(24px, 5vh, 48px);
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab-btn {
      padding: 10px 24px;
      border-radius: 30px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      background: rgba(0, 0, 0, 0.2);
      color: rgba(255, 215, 0, 0.6);
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 1.2vw, 1.1rem);
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .tab-btn:hover {
      border-color: rgba(255, 215, 0, 0.7);
      color: rgba(255, 215, 0, 0.9);
      background: rgba(255, 215, 0, 0.05);
    }

    .tab-btn.active {
      background: rgba(255, 215, 0, 0.2);
      border-color: #ffe566;
      color: #ffe566;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ── 게임 리스트 ─────────────────────────────────────────────────── */
    .game-list {
      display: flex;
      gap: clamp(12px, 2vw, 32px);
      flex-wrap: wrap;
      justify-content: center;
      z-index: 10;
      position: relative;
      width: 100%;
      max-width: 1300px;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .game-list.hidden {
      display: none !important;
    }

    /* ── 게임 카드 ───────────────────────────────────────────────────── */
    .game-card {
      box-sizing: border-box !important;
      background: linear-gradient(160deg, #1a2e1a 0%, #0d1a0d 100%);
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: min(24px, 6vw);
      padding: clamp(16px, 4vw, 24px);
      text-align: center;
      color: #f0f0f0;
      cursor: pointer;
      /* Fluid width: Never exceed screen width while maintaining desired desktop size */
      width: min(calc(100vw - 40px), clamp(240px, 20vw, 300px)) !important;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 15px 35px rgba(0, 0, 0, 0.5),
        inset 0 0 20px rgba(255, 215, 0, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(255, 215, 0, 0.9);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.7),
        0 0 20px rgba(255, 215, 0, 0.2);
    }

    .game-thumbnail {
      font-size: clamp(3rem, 10vw, 4rem);
      height: clamp(100px, 15vh, 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .game-thumbnail-img-wrap {
      width: 100%;
      aspect-ratio: 16/10;
      margin-bottom: clamp(12px, 2vw, 16px);
      border-radius: min(14px, 4vw);
      overflow: hidden;
      flex-shrink: 0;
      background: #000;
      border: 1px solid rgba(255, 215, 0, 0.1);
    }

    .game-thumbnail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    
    .game-card:hover .game-thumbnail-img {
      transform: scale(1.1);
    }

    .game-card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-family: 'Cinzel', serif;
      background: linear-gradient(180deg, #ffe566 0%, #b8960c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-card p {
      margin: 4px 0;
      color: rgba(220, 220, 220, 0.9);
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      line-height: 1.4;
    }

    .game-meta {
      font-size: clamp(0.7rem, 2.5vw, 0.85rem) !important;
      color: rgba(255, 215, 0, 0.7) !important;
      margin-top: auto !important;
      padding-top: 14px;
      font-weight: bold;
    }

    /* ── Responsive Background (Oval) ── */
    body.host-board::before {
      /* Fluid inset to avoid crushing content */
      inset: clamp(12px, 3vw, 40px);
      border-radius: clamp(20px, 8vw, 120px);
    }
    
    body.host-board::after {
      inset: clamp(24px, 6vw, 90px);
      border-radius: clamp(16px, 6vw, 100px);
    }

    /* ── Tablet / Large Phone ── */
    @media (max-width: 900px) {
      .game-card {
        width: min(calc(50% - 20px), 320px);
      }
    }

    /* ── Phone (Narrow) ── */
    @media (max-width: 600px) {
      body.host-board {
        padding: 40px 16px 60px !important;
      }
      
      .game-card {
        width: 100% !important;
        max-width: 320px;
        margin-bottom: 0;
      }
      
      /* Reduced insets for narrow screens to maximize space */
      body.host-board::before {
        inset: 10px !important;
        border-radius: 20px !important;
        border-width: 3px !important;
      }
      
      body.host-board::after {
        inset: 18px !important;
        border-radius: 15px !important;
        display: block !important; /* Keep it but much subtler */
        opacity: 0.3;
      }
      
      .lobby-title {
        font-size: clamp(1.6rem, 8vw, 2.2rem);
        letter-spacing: 2px;
        margin-bottom: 24px;
      }

      .tab-bar {
        gap: 8px;
        margin-bottom: 32px;
      }

      .tab-btn {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body class="host-board">
  <h1 class="lobby-title">🎮 게임 선택</h1>

  <div class="tab-bar">
    <button id="tab-multi" class="tab-btn active">👥 멀티플레이어</button>
    <button id="tab-solo"  class="tab-btn">🎯 혼자하는 게임</button>
  </div>

  <div id="multi-game-list" class="game-list"></div>
  <div id="solo-game-list"  class="game-list hidden"></div>

  <script type="module" src="/src/lobby.js"></script>
</body>
</html>
