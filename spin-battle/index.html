<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Battle - Board</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/spin-battle-style.css">
</head>
<body class="spin-board">

  <!-- QR codes -->
  <div id="qr-tl" class="qr-container"></div>
  <div id="qr-tr" class="qr-container" style="right:60px;top:60px;left:auto;"></div>
  <div id="qr-bl" class="qr-container" style="bottom:60px;left:60px;top:auto;"></div>
  <div id="qr-br" class="qr-container" style="bottom:60px;right:60px;top:auto;left:auto;"></div>

  <!-- Three.js canvas container -->
  <div id="spin-canvas"></div>

  <!-- HUD Overlay -->
  <div id="spin-hud">
    <div id="rpm-bars"></div>
  </div>

  <!-- Lobby Overlay -->
  <div id="lobby-overlay" class="spin-overlay">
    <div class="spin-panel">
      <h1>Spin Battle</h1>
      <p id="session-id-display">Session: ...</p>
      <div id="player-list"></div>
      <p id="player-count-display" class="spin-sub">대기 중...</p>
      <button id="btn-start" disabled>START</button>
    </div>
  </div>

  <!-- Launching Overlay -->
  <div id="launch-overlay" class="spin-overlay hidden">
    <div class="spin-panel">
      <h2>런칭!</h2>
      <p>모바일을 빠르게 비틀어서 회전력을 모으세요!</p>
      <div id="launch-countdown" class="spin-countdown">3</div>
    </div>
  </div>

  <!-- Countdown Overlay -->
  <div id="countdown-overlay" class="spin-overlay hidden">
    <div class="spin-countdown-big" id="battle-countdown">3</div>
  </div>

  <!-- Result Overlay -->
  <div id="result-overlay" class="spin-overlay hidden">
    <div class="spin-panel">
      <h2>결과</h2>
      <div id="rankings-display"></div>
      <button id="btn-restart">다시 하기</button>
    </div>
  </div>

  <script type="module" src="/src/spin-battle-main.js"></script>
</body>
</html>
